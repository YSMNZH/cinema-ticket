<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #000; /* Black background */
            color: white;
            font-family: 'Arial', sans-serif;
        }

        .forgot-password-container {
            max-width: 500px;
            margin: 50px auto;
            background: #1c1c1c; /* Dark gray background */
            padding: 30px;
            border-radius: 15px;
            border: 2px solid #ff3668; /* Red border */
            box-shadow: 0px 8px 15px rgba(255, 54, 104, 0.3); /* Red glow */
        }

        h1 {
            font-size: 2rem;
            text-align: center;
            margin-bottom: 20px;
            color: #ff3668; /* Red title */
        }

        label {
            color: white;
        }

        .btn-custom {
            background-color: #ff3668; /* Bright red button */
            border: none;
            font-weight: bold;
            color: white;
        }

        .btn-custom:hover {
            background-color: #e62e5c; /* Darker red on hover */
        }

        .messages {
            margin-top: 20px;
            list-style: none;
            padding: 0;
        }

        .messages li {
            background: rgba(255, 54, 104, 0.2); /* Transparent red */
            padding: 10px;
            margin-bottom: 10px;
            border-radius: 5px;
            text-align: center;
            color: white;
        }

        .footer-text {
            text-align: center;
            color: rgba(255, 255, 255, 0.8);
            margin-top: 20px;
        }

        .footer-text a {
            color: #ff3668;
            text-decoration: none;
        }

        .footer-text a:hover {
            color: #e62e5c; /* Darker red on hover */
        }

        input:focus {
            border-color: #ff3668; /* Red border on focus */
            outline: none;
            box-shadow: 0 0 8px rgba(255, 54, 104, 0.6);
        }
    </style>
</head>
<body>
    <div class="forgot-password-container">
        <h1>Forgot Password</h1>
        <form method="POST">
            {% csrf_token %}
            <div class="mb-3">
                <label for="email" class="form-label">Enter your email:</label>
                <input type="email" id="email" name="email" class="form-control" placeholder="e.g., yourname@example.com" required>
            </div>
            <button type="submit" class="btn btn-custom w-100">Send Reset Link</button>
        </form>

        {% if messages %}
            <ul class="messages">
                {% for message in messages %}
                    <li>{{ message }}</li>
                {% endfor %}
            </ul>
        {% endif %}
    </div>

    <p class="footer-text">Remembered your password? <a href="/users/login">Login here</a>.</p>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
